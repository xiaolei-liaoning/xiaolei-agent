[tool.black]
line-length = 88
target-version = ['py37', 'py38', 'py39', 'py310']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | __pycache__
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_test_loop_scope = "function"

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 88
known_first_party = ["core", "skills", "tools"]
skip = [".venv", "__pycache__", "build", "dist"]
