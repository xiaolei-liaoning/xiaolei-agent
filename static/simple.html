<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小雷版Agent - 简洁聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
        }
        
        /* 侧边栏 - 历史记录 */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .sidebar-header h2 {
            font-size: 18px;
            color: #333;
        }
        
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        
        .history-item {
            padding: 12px;
            margin-bottom: 8px;
            background: #f9f9f9;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .history-item:hover {
            background: #e8e8e8;
        }
        
        .history-item.active {
            background: #667eea;
            color: white;
        }
        
        .history-item-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .history-item-time {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .new-chat-btn {
            margin: 10px;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .new-chat-btn:hover {
            background: #5a6fd6;
        }
        
        /* 主聊天区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h1 {
            font-size: 20px;
            color: #333;
        }
        
        .status-badge {
            padding: 4px 12px;
            background: #52c41a;
            color: white;
            border-radius: 12px;
            font-size: 12px;
        }
        
        /* 消息区 */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        
        .message.user {
            align-self: flex-end;
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant {
            align-self: flex-start;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .message-content {
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .message-meta {
            margin-top: 8px;
            font-size: 12px;
            opacity: 0.7;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            align-self: flex-start;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }
        
        /* 输入区 */
        .input-area {
            padding: 20px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .input-wrapper textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            font-size: 14px;
            font-family: inherit;
            min-height: 44px;
            max-height: 120px;
        }
        
        .input-wrapper textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .send-btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .send-btn:hover {
            background: #5a6fd6;
        }
        
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>聊天历史</h2>
        </div>
        <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
        <div class="history-list" id="historyList"></div>
    </div>
    
    <!-- 主聊天区 -->
    <div class="main">
        <div class="chat-header">
            <h1>小雷版Agent</h1>
            <span class="status-badge" id="statusBadge">在线</span>
        </div>
        
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-content">你好！我是小雷版Agent，有什么可以帮你的吗？</div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    placeholder="输入消息..." 
                    rows="1"
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE = window.location.port === '5500' ? 'http://localhost:8001' : '';
        
        // 状态管理
        let currentSessionId = null;
        let conversations = {};
        let isLoading = false;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            autoResizeTextarea();
        });
        
        // 自动调整文本框高度
        function autoResizeTextarea() {
            const textarea = document.getElementById('userInput');
            textarea.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });
        }
        
        // 加载历史记录
        function loadHistory() {
            try {
                const saved = localStorage.getItem('chat_conversations');
                if (saved) {
                    conversations = JSON.parse(saved);
                }
                renderHistoryList();
            } catch (e) {
                console.error('加载历史失败:', e);
            }
        }
        
        // 保存历史记录
        function saveHistory() {
            try {
                localStorage.setItem('chat_conversations', JSON.stringify(conversations));
            } catch (e) {
                console.error('保存历史失败:', e);
            }
        }
        
        // 渲染历史列表
        function renderHistoryList() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            const sessions = Object.entries(conversations)
                .sort((a, b) => new Date(b[1].updatedAt) - new Date(a[1].updatedAt));
            
            sessions.forEach(([id, session]) => {
                const item = document.createElement('div');
                item.className = `history-item ${id === currentSessionId ? 'active' : ''}`;
                item.onclick = () => loadSession(id);
                
                const title = session.messages[0]?.content?.substring(0, 30) || '新对话';
                const time = new Date(session.updatedAt).toLocaleString('zh-CN', {
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                item.innerHTML = `
                    <div class="history-item-title">${title}</div>
                    <div class="history-item-time">${time}</div>
                `;
                list.appendChild(item);
            });
        }
        
        // 新对话
        function newChat() {
            currentSessionId = Date.now().toString();
            conversations[currentSessionId] = {
                messages: [],
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
            saveHistory();
            renderHistoryList();
            document.getElementById('messages').innerHTML = `
                <div class="message assistant">
                    <div class="message-content">你好！我是小雷版Agent，有什么可以帮你的吗？</div>
                </div>
            `;
        }
        
        // 加载会话
        function loadSession(sessionId) {
            currentSessionId = sessionId;
            renderHistoryList();
            
            const session = conversations[sessionId];
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            session.messages.forEach(msg => {
                appendMessage(msg.role, msg.content, msg.metadata);
            });
            
            scrollToBottom();
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message || isLoading) return;
            
            // 确保有当前会话
            if (!currentSessionId) {
                newChat();
            }
            
            // 显示用户消息
            appendMessage('user', message);
            conversations[currentSessionId].messages.push({
                role: 'user',
                content: message,
                timestamp: new Date().toISOString()
            });
            
            // 清空输入
            input.value = '';
            input.style.height = 'auto';
            
            // 显示加载状态
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            const typingDiv = showTyping();
            
            try {
                // 调用简化聊天 API
                const response = await fetch(`${API_BASE}/api/simple/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        user_id: 1,
                        agent_id: 'v1_react'
                    })
                });
                
                const data = await response.json();
                
                // 移除加载状态
                typingDiv.remove();
                
                // 显示回复
                const reply = data.reply || data.error || '抱歉，处理请求时出错';
                appendMessage('assistant', reply, data.thinking_process);
                
                // 保存到历史
                conversations[currentSessionId].messages.push({
                    role: 'assistant',
                    content: reply,
                    metadata: data.thinking_process,
                    timestamp: new Date().toISOString()
                });
                conversations[currentSessionId].updatedAt = new Date().toISOString();
                saveHistory();
                renderHistoryList();
                
            } catch (error) {
                typingDiv.remove();
                appendMessage('assistant', `请求失败: ${error.message}`);
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
            }
            
            scrollToBottom();
        }
        
        // 追加消息到界面
        function appendMessage(role, content, metadata) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            let metaHtml = '';
            if (metadata && role === 'assistant') {
                const mode = metadata.mode || 'v1_react';
                const agents = metadata.agents_used || [];
                metaHtml = `<div class="message-meta">模式: ${mode} | Agent: ${agents.length}个</div>`;
            }
            
            msgDiv.innerHTML = `
                <div class="message-content">${escapeHtml(content)}</div>
                ${metaHtml}
            `;
            messagesDiv.appendChild(msgDiv);
        }
        
        // 显示打字指示器
        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            messagesDiv.appendChild(typingDiv);
            scrollToBottom();
            return typingDiv;
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 滚动到底部
        function scrollToBottom() {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        // 键盘快捷键
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
    </script>
</body>
</html>
