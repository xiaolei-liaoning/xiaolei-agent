            function updateToolParam(nodeId) {
                const keySelect = document.getElementById(`tool-param-key-${nodeId}`);
                const valueInput = document.getElementById(`tool-param-value-${nodeId}`);
                if (keySelect && valueInput) {
                    const key = keySelect.value;
                    const value = valueInput.value;
                    const paramString = key && value ? `${key}=${value}` : '';
                    updateNodeConfig(nodeId, 'params', paramString);
                }
            }
            
            function updateEndOutput(nodeId) {
                const typeSelect = document.getElementById(`end-output-type-${nodeId}`);
                const valueInput = document.getElementById(`end-output-value-${nodeId}`);
                if (typeSelect && valueInput) {
                    const type = typeSelect.value;
                    let outputValue = valueInput.value;
                    
                    if (type && type !== '自定义') {
                        outputValue = type;
                        valueInput.value = type;
                    }
                    
                    updateNodeConfig(nodeId, 'output', outputValue);
                }
            }
            
            function updateNodeConfig(nodeId, key, value) {
                const node = nodes.find(n => n.id === nodeId);
                if (node) {
                    node.config[key] = value;
                    
                    // 对于工具节点，只更新显示文本，不重新渲染整个属性面板
                    if (node.type === 'tool' && (key === 'tool' || key === 'params')) {
                        const nodeElement = document.querySelector(`[data-node-id="${nodeId}"]`);
                        if (nodeElement) {
                            const contentElement = nodeElement.querySelector('.node-content');
                            if (contentElement) {
                                if (key === 'tool') {
                                    contentElement.textContent = `工具: ${value || '未选择'}`;
                                } else if (key === 'params' && node.config.tool) {
                                    contentElement.textContent = `工具: ${node.config.tool}\n参数: ${value || '无'}`;
                                }
                            }
                        }
                    } else if (selectedNode && selectedNode.id === nodeId) {
                        // 其他情况才重新渲染属性面板
                        showProperties(node);
                    }
                    
                    // 更新节点显示（除了工具节点已经处理过）
                    if (node.type !== 'tool' || (key !== 'tool' && key !== 'params')) {
                        const nodeElement = document.querySelector(`[data-node-id="${nodeId}"]`);
                        if (nodeElement) {
                            const contentElement = nodeElement.querySelector('.node-content');
                            if (contentElement) {
                                switch (node.type) {
                                    case 'start':
                                        contentElement.textContent = `输入: ${node.config.input || '用户输入'}`;
                                        break;
                                    case 'llm':
                                        contentElement.textContent = `模型: ${node.config.model || 'glm-4-flash'}`;
                                        break;
                                    case 'calculator':
                                        contentElement.textContent = `操作: ${node.config.operation || 'add'}`;
                                        break;
                                    case 'http':
                                        contentElement.textContent = `方法: ${node.config.method || 'GET'}`;
                                        break;
                                    case 'condition':
                                        contentElement.textContent = `条件: ${node.config.condition || 'true'}`;
                                        break;
                                    case 'loop':
                                        contentElement.textContent = `类型: ${node.config.loop_type || 'array'}`;
                                        break;
                                    case 'parallel':
                                        contentElement.textContent = `分支数: ${node.config.branch_count || 2}`;
                                        break;
                                    case 'end':
                                        contentElement.textContent = `输出: ${node.config.output || '{{result}}'}`;
                                        break;
                                }
                            }
                        }
                    }
                }
            }
            
            function deleteWorkflowBox(boxId) {
                if (confirm('确定删除此工作流框？')) {
                    // 从workflowBoxes数组中删除工作流框
                    const boxIndex = workflowBoxes.findIndex(box => box.id === boxId);
                    if (boxIndex !== -1) {
                        workflowBoxes.splice(boxIndex, 1);
                    }
                    
                    // 从edges数组中删除与该工作流框相关的所有连线
                    edges = edges.filter(edge => edge.source !== boxId && edge.target !== boxId);
                    
                    // 从DOM中删除工作流框元素
                    const boxElement = document.querySelector(`[data-box-id="${boxId}"]`);
                    if (boxElement) {
                        boxElement.remove();
                    }
                    
                    // 更新连线显示
                    updateConnections();
                }
            }
            
            function createNode(type, x, y) {
                if (type === 'workflow-box') {
                    boxIdCounter++;
                    const workflowBox = {
                        id: `box_${boxIdCounter}`,
                        type: 'workflow-box',
                        x: x - 150, // 居中
                        y: y - 100,
                        width: 300,
                        height: 200,
                        config: {
                            name: '循环体'
                        }
                    };
                    workflowBoxes.push(workflowBox);
                    renderWorkflowBox(workflowBox);
                } else {
                    nodeIdCounter++;
                    const node = {
                        id: `node_${nodeIdCounter}`,
                        type: type,
                        x: x - 90, // 居中
                        y: y - 40,
                        config: getDefaultConfig(type)
                    };
                    nodes.push(node);
                    renderNode(node);
                    
                    // 如果是循环节点，自动生成工作流框并建立连接
                    if (type === 'loop') {
                        createLoopWorkflowBox(node);
                    }
                }
            }
            
            // 为循环节点自动生成工作流框并建立连接
            function createLoopWorkflowBox(loopNode) {
                boxIdCounter++;
                
                // 创建工作流框（在循环节点下方）
                const workflowBox = {
                    id: `box_${boxIdCounter}`,
                    type: 'workflow-box',
                    x: loopNode.x - 60, // 居中对齐循环节点
                    y: loopNode.y + 120, // 在循环节点下方
                    width: 300,
                    height: 200,
                    config: {
                        name: '循环体'
                    }
                };
                workflowBoxes.push(workflowBox);
                renderWorkflowBox(workflowBox);
                
                // 在工作流框内自动创建一个LLM节点作为示例
                nodeIdCounter++;
                const exampleNode = {
                    id: `node_${nodeIdCounter}`,
                    type: 'llm',
                    x: workflowBox.x + 60, // 在工作流框内居中
                    y: workflowBox.y + 40, // 在工作流框内靠上
                    config: {
                        prompt: '处理当前项: {{item}}',
                        model: 'glm-4-flash'
                    },
                    parentBox: workflowBox.id // 标记此节点属于哪个工作流框
                };
                nodes.push(exampleNode);
                renderNode(exampleNode);
                
                // 创建从工作流框顶部到示例节点的连接
                const edge1 = {
                    id: `edge_${Date.now()}_1`,
                    source: workflowBox.id,
                    target: exampleNode.id,
                    sourceDirection: 'top',
                    targetDirection: 'left'
                };
                edges.push(edge1);
                
                // 创建从循环节点到工作流框的连接（循环节点底部 -> 工作流框顶部）
                const edge2 = {
                    id: `edge_${Date.now()}_2`,
                    source: loopNode.id,
                    target: workflowBox.id,
                    sourceDirection: 'bottom',
                    targetDirection: 'top'
                };
                edges.push(edge2);
                
                // 创建从工作流框到循环节点的连接（工作流框底部 -> 循环节点顶部）
                const edge3 = {
                    id: `edge_${Date.now()}_3`,
                    source: workflowBox.id,
                    target: loopNode.id,
                    sourceDirection: 'bottom',
                    targetDirection: 'top'
                };
                edges.push(edge3);
                
                // 更新连线显示
                updateConnections();
            }
            
            function getDefaultConfig(type) {
                const configs = {
                    start: { input: '用户输入' },
                    llm: { prompt: '', model: 'glm-4-flash' },
                    tool: { tool: '', params: '' },
                    calculator: { operation: 'add', operand1: '1', operand2: '2' },
                    http: { method: 'GET', url: 'https://api.example.com', headers: '', body: '' },
                    condition: { condition: '{{result}} > 10', true_branch: 'node_true', false_branch: 'node_false' },
                    loop: { max_iterations: 100, loop_type: 'array' },
                    parallel: { branches: '', branch_count: 2, sync_mode: 'wait_all' },
                    database: { operation: 'query', connection: 'default', sql: 'SELECT * FROM table', params: '' },
                    file: { operation: 'read', path: '/path/to/file', encoding: 'utf-8' },
                    transform: { transformation: 'json_to_csv', input_field: 'data', output_field: 'result' },
                    message_queue: { operation: 'publish', queue: 'default', message: '' },
                    end: { output: '{{result}}' }
                };
                return configs[type] || {};
            }
            
            // 点击画布取消选择
            canvas.addEventListener('click', () => {
                document.querySelectorAll('.canvas-node').forEach(n => n.classList.remove('selected'));
                selectedNode = null;
                propertiesContent.innerHTML = '<p style="color: #999;">选择一个节点查看属性</p>';
            });
            
            // 拖拽添加节点
            document.querySelectorAll('.node-item').forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', e.target.dataset.type);
                });
            });
            
            // 画布拖拽放置
            canvas.addEventListener('drop', (e) => {
                e.preventDefault();
                const type = e.dataTransfer.getData('text/plain');
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                addNode(type, x, y);
            });
            
            // 画布拖拽放置区域
            canvas.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            
            // 导出工作流
            function exportWorkflow() {
                const workflow = {
                    id: `wf_${new Date().getTime()}`,
                    name: '工作流',
                    nodes: nodes,
                    edges: edges,
                    workflowBoxes: workflowBoxes
                };
                
                const blob = new Blob([JSON.stringify(workflow, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `workflow_${Date.now()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showResult('✅ 工作流已导出');
            }
            
            // 导入工作流
            function importWorkflow() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const workflow = JSON.parse(event.target.result);
                            
                            // 清空现有数据
                            nodes = [];
                            edges = [];
                            workflowBoxes = [];
                            selectedNode = null;
                            
                            // 加载导入的数据
                            if (workflow.nodes) nodes = workflow.nodes;
                            if (workflow.edges) edges = workflow.edges;
                            if (workflow.workflowBoxes) workflowBoxes = workflow.workflowBoxes;
                            
                            // 更新计数器
                            nodeIdCounter = nodes.length;
                            boxIdCounter = workflowBoxes.length;
                            
                            // 重新渲染
                            canvas.innerHTML = '<svg id="connections"></svg>';
                            svg = document.getElementById('connections');
                            
                            workflowBoxes.forEach(box => renderWorkflowBox(box));
                            nodes.forEach(node => renderNode(node));
                            
                            showResult('✅ 工作流导入成功');
                        } catch (err) {
                            showResult('❌ 导入失败：无效的工作流文件', true);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            function toggleResultBox() {

                resultBox.style.display = resultBox.style.display === 'none' ? 'block' : 'none';

                    edges: edges

            // 复制AI提示词
            function copyAIPrompt() {

                document.execCommand('copy');
                showResult('✅ XML已复制到剪贴板！');

            // 验证工作流
            function validateWorkflow() {
                const errors = [];
                const warnings = [];
                
                // 检查是否有开始节点
                const hasStart = nodes.some(n => n.type === 'start');
                if (!hasStart) {
                    errors.push('缺少开始节点（start）');
                }
                
                // 检查是否有结束节点
                const hasEnd = nodes.some(n => n.type === 'end');
                if (!hasEnd) {
                    errors.push('缺少结束节点（end）');
                }
                
                // 检查节点ID唯一性
                const nodeIds = nodes.map(n => n.id);
                const duplicates = nodeIds.filter((id, index) => nodeIds.indexOf(id) !== index);
                if (duplicates.length > 0) {
                    errors.push(`存在重复的节点ID: ${[...new Set(duplicates)].join(', ')}`);
                }
                
                // 检查连线有效性
                const nodeIdSet = new Set(nodeIds);
                edges.forEach(edge => {
                    if (!nodeIdSet.has(edge.source)) {
                        errors.push(`连线源节点不存在: ${edge.source}`);
                    }
                    if (!nodeIdSet.has(edge.target)) {
                        errors.push(`连线目标节点不存在: ${edge.target}`);
                    }
                });
                
                // 检查孤立节点
                const connectedNodes = new Set();
                edges.forEach(edge => {
                    connectedNodes.add(edge.source);
                    connectedNodes.add(edge.target);
                });
                
                nodes.forEach(node => {
                    if (node.type !== 'start' && node.type !== 'end' && !connectedNodes.has(node.id)) {
                        warnings.push(`节点 '${node.id}' (${node.type}) 未连接到工作流`);
                    }
                });
                
                // 检查条件节点配置
                nodes.filter(n => n.type === 'condition').forEach(node => {
                    if (!node.config.true_branch || !node.config.false_branch) {
                        warnings.push(`条件节点 '${node.id}' 缺少true_branch或false_branch配置`);
                    }
                });
                
                // 检查循环节点配置
                nodes.filter(n => n.type === 'loop').forEach(node => {
                    const maxIter = node.config.max_iterations || 100;
                    if (maxIter > 1000) {
                        warnings.push(`循环节点 '${node.id}' 的最大迭代次数(${maxIter})过大`);
                    }
                });
                
                // 检查工作流复杂度
                if (nodes.length > 50) {
                    warnings.push(`工作流包含${nodes.length}个节点，建议拆分为多个子工作流`);
                }
                
                return {
                    valid: errors.length === 0,
                    message: errors.length === 0 && warnings.length === 0 ? '✅ 验证通过' : 
                             (errors.length > 0 ? `❌ 错误(${errors.length}): ${errors.join('; ')}` : '') +
                             (warnings.length > 0 ? `\n⚠️ 警告(${warnings.length}): ${warnings.join('; ')}` : ''),
                    errors,
                    warnings
                };
            }
            
            // 验证并显示结果
            function validateAndShow() {
                const validation = validateWorkflow();
                showResult(validation.message, !validation.valid);
            }
            
            async function saveWorkflow() {
                if (nodes.length === 0) {
                    showResult('请先添加节点', true);
                    return;
                }
                
                // 执行前端验证
                const validation = validateWorkflow();
                if (!validation.valid) {
                    showResult(validation.message, true);
                    return;
                }
                
                // 如果有警告，提示用户
                if (validation.warnings.length > 0) {
                    if (!confirm(`工作流存在以下警告：\n\n${validation.warnings.join('\n')}\n\n是否继续保存？`)) {
                        return;
                    }
                }
                
                const workflow = {
                    id: `wf_${new Date().getTime()}`,
                    name: '工作流',
                    nodes: nodes,
                    edges: edges,
                    workflowBoxes: workflowBoxes
                };
                
                try {
                    showResult('保存中...');
                    
                    const response = await fetch('/api/workflow/execute-data', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            workflow: workflow,
                            input_data: {}
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        // 只显示文本结果
                        const textResult = data.result.output || JSON.stringify(data.result);
                        showResult('✅ 工作流执行成功！\n\n结果：\n' + textResult);
                        
                        // 生成AI分析提示词
                        generateAIPrompt(workflow.id);
                    } else {
                        showResult('❌ 工作流执行失败：' + data.error, true);
                    }
                } catch (error) {
                    showResult('❌ 保存失败: ' + error.message + '\n\n请确保后端服务已启动 (localhost:8001)', true);
                }
            }
            
            // 清空画布
            function clearCanvas() {
                if (confirm('确定清空画布吗？')) {
                    // 清空节点和连线
                    nodes = [];
                    edges = [];
                    workflowBoxes = [];
                    selectedNode = null;
                    
                    // 清空DOM
                    canvas.innerHTML = '<svg id="connections"></svg>';
                    svg = document.getElementById('connections');
                    
                    // 重置计数器
                    nodeIdCounter = 0;
                    boxIdCounter = 0;
                    
                    // 清空属性面板
                    propertiesContent.innerHTML = '<p style="color: #999;">选择一个节点查看属性</p>';
                    document.getElementById('ai-prompt-section').style.display = 'none';
                }
            }
            
            // 测试执行工作流
            async function testWorkflow() {
                if (nodes.length === 0) {
                    showResult('请先添加节点', true);
                    return;
                }
                
                // 验证工作流结构
                const validation = validateWorkflow();
                if (!validation.valid) {
                    showResult('❌ 工作流验证失败: ' + validation.message, true);
                    return;
                }
                
                // 生成工作流数据（清理不必要的字段）
                const workflowData = {
                    id: `workflow_${Date.now()}`,
                    name: '测试工作流',
                    nodes: nodes.map(n => {
                        return {
                            id: n.id,
                            type: n.type,
                            config: n.config || {}
                        };
                    }),
                    edges: edges.map(e => {
                        return {
                            id: e.id,
                            source: e.source,
                            target: e.target,
                            sourceDirection: e.sourceDirection || 'right',
                            targetDirection: e.targetDirection || 'left',
                            condition: e.condition || ''
                        };
                    })
                };
                
                try {
                    // 显示加载状态
                    const toolbar = document.querySelector('.toolbar');
                    const testButton = toolbar.querySelector('button');
                    const originalText = testButton.textContent;
                    testButton.textContent = '执行中...';
                    testButton.disabled = true;
                    
                    showResult('执行中...');
                    
                    // 发送执行请求到后端服务（使用相对路径）
                    const response = await fetch('/api/workflow/execute-data', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            workflow: workflowData,
                            input_data: {
                                list: [1, 2, 3],
                                result: 15
                            }
                        })
                    });
                    
                    const result = await response.json();
                    
                    // 恢复按钮状态
                    testButton.textContent = originalText;
                    testButton.disabled = false;
                    
                    // 显示执行结果
                    if (result.success) {
                        // 格式化结果显示
                        let textResult = '';
                        if (result.result && typeof result.result === 'object') {
                            if (result.result.output) {
                                textResult = result.result.output;
                            } else if (result.result.data) {
                                textResult = typeof result.result.data === 'string' 
                                    ? result.result.data 
                                    : JSON.stringify(result.result.data, null, 2);
                            } else {
                                textResult = JSON.stringify(result.result, null, 2);
                            }
                        } else {
                            textResult = String(result.result);
                        }
                        showResult('✅ 执行成功！\n\n结果：\n' + textResult);
                    } else {
                        showResult('❌ 执行失败: ' + (result.error || '未知错误'), true);
                    }
                } catch (error) {
                    showResult('❌ 测试执行失败: ' + error.message + '\n\n请确保后端服务已启动', true);
                    
                    // 恢复按钮状态
                    const toolbar = document.querySelector('.toolbar');
                    const testButton = toolbar.querySelector('button');
                    testButton.textContent = '测试执行';
                    testButton.disabled = false;
                }
            }
            
            function validateWorkflow() {
                // 检查是否有开始节点
                const hasStart = nodes.some(n => n.type === 'start');
                if (!hasStart) {
                    return { valid: false, message: '缺少开始节点' };
                }
                
                // 检查是否有结束节点
                const hasEnd = nodes.some(n => n.type === 'end');
                if (!hasEnd) {
                    return { valid: false, message: '缺少结束节点' };
                }
                
                // 检查节点是否有必要的配置
                for (const node of nodes) {
                    if (node.type === 'llm' && !node.config?.prompt) {
                        return { valid: false, message: `LLM节点 ${node.id} 缺少提示词配置` };
                    }
                    if (node.type === 'tool' && !node.config?.tool) {
                        return { valid: false, message: `工具节点 ${node.id} 缺少工具名称配置` };
                    }
                    if (node.type === 'loop' && !node.config?.loop_type) {
                        return { valid: false, message: `循环节点 ${node.id} 缺少循环类型配置` };
                    }
                }
                
                return { valid: true, message: '' };
            }
            
            // 主题切换功能
            function toggleTheme() {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                const themeBtn = document.getElementById('theme-toggle');
                if (themeBtn) {
                    themeBtn.textContent = isDark ? '☀️' : '🌓';
                }
                
                // 更新网格背景
                updateGridBackground();
            }
            
            // 更新网格背景
            function updateGridBackground() {
                const canvasElement = document.getElementById('workflow-canvas');
                const isDark = document.body.classList.contains('dark-mode');
                
                if (!canvasElement) return;
                
                const gridSize = 24;
                const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                
                canvasElement.style.backgroundImage = `
                    linear-gradient(${gridColor} 1px, transparent 1px),
                    linear-gradient(90deg, ${gridColor} 1px, transparent 1px)
                `;
                canvasElement.style.backgroundSize = `${gridSize}px ${gridSize}px`;
            }
            
            // 页面加载时恢复主题设置并初始化网格
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                const themeBtn = document.getElementById('theme-toggle');
                if (themeBtn) themeBtn.textContent = '☀️';
            }
            
            // 延迟初始化网格背景（等待DOM完全加载）
            setTimeout(updateGridBackground, 100);
            
            // 将需要全局访问的函数暴露到window对象
            window.clearCanvas = clearCanvas;
            window.generateXML = generateXML;
            window.saveWorkflow = saveWorkflow;
            window.testWorkflow = testWorkflow;
            window.copyAIPrompt = copyAIPrompt;
            window.deleteWorkflowBox = deleteWorkflowBox;
            window.refreshSkills = refreshSkills;
            window.deleteNode = deleteNode;
            window.zoomIn = zoomIn;
            window.zoomOut = zoomOut;
            window.resetZoom = resetZoom;
            window.exportWorkflow = exportWorkflow;
            window.importWorkflow = importWorkflow;
            window.toggleResultBox = toggleResultBox;
            window.toggleTheme = toggleTheme;
            window.validateAndShow = validateAndShow;
            window.undo = undo;
            window.redo = redo;
        });
    </script>
</body>
</html>
