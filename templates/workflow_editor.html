        function updateToolParam(nodeId) {
            const keySelect = document.getElementById(`tool-param-key-${nodeId}`);
            const valueInput = document.getElementById(`tool-param-value-${nodeId}`);
            if (keySelect && valueInput) {
                const key = keySelect.value;
                const value = valueInput.value;
                const paramString = key && value ? `${key}=${value}` : '';
                updateNodeConfig(nodeId, 'params', paramString);
            }
        }

        function updateEndOutput(nodeId) {
            const typeSelect = document.getElementById(`end-output-type-${nodeId}`);
            const valueInput = document.getElementById(`end-output-value-${nodeId}`);
            if (typeSelect && valueInput) {
                const type = typeSelect.value;
                let outputValue = valueInput.value;
                
                if (type && type !== '自定义') {
                    outputValue = type;
                    valueInput.value = type;
                }
                
                updateNodeConfig(nodeId, 'output', outputValue);
            }
        }

        function updateNodeConfig(nodeId, key, value) {
            const node = nodes.find(n => n.id === nodeId);
            if (node) {
                node.config[key] = value;
                
                // 对于工具节点，只更新显示文本，不重新渲染整个属性面板
                if (node.type === 'tool' && (key === 'tool' || key === 'params')) {
                    const nodeElement = document.querySelector(`[data-node-id="${nodeId}"]`);
                    if (nodeElement) {
                        const contentElement = nodeElement.querySelector('.node-content');
                        if (contentElement) {
                            if (key === 'tool') {
                                contentElement.textContent = `工具: ${value || '未选择'}`;
                            } else if (key === 'params' && node.config.tool) {
                                contentElement.textContent = `工具: ${node.config.tool}\n参数: ${value || '无'}`;
                            }
                        }
                    }
                } else if (selectedNode && selectedNode.id === nodeId) {
                    // 其他情况才重新渲染属性面板
                    showProperties(node);
                }
                
                // 更新节点显示（除了工具节点已经处理过）
                if (node.type !== 'tool' || (key !== 'tool' && key !== 'params')) {
                    const nodeElement = document.querySelector(`[data-node-id="${nodeId}"]`);
                    if (nodeElement) {
                        const contentElement = nodeElement.querySelector('.node-content');
                        if (contentElement) {
                            switch (node.type) {
                                case 'start':
                                    contentElement.textContent = `输入: ${node.config.input || '用户输入'}`;
                                    break;
                                case 'llm':
                                    contentElement.textContent = `模型: ${node.config.model || 'glm-4-flash'}`;
                                    break;
                                case 'calculator':
                                    contentElement.textContent = `操作: ${node.config.operation || 'add'}`;
                                    break;
                                case 'http':
                                    contentElement.textContent = `方法: ${node.config.method || 'GET'}`;
                                    break;
                                case 'condition':
                                    contentElement.textContent = `条件: ${node.config.condition || 'true'}`;
                                    break;
                                case 'loop':
                                    contentElement.textContent = `类型: ${node.config.loop_type || 'array'}`;
                                    break;
                                case 'parallel':
                                    contentElement.textContent = `分支数: ${node.config.branch_count || 2}`;
                                    break;
                                case 'end':
                                    contentElement.textContent = `输出: ${node.config.output || '{{result}}'}`;
                                    break;
                            }
                        }
                    }
                }
            }
        }

        function deleteNode(nodeId) {
            if (confirm('确定删除此节点吗？')) {
                // 从nodes数组中删除节点
                const nodeIndex = nodes.findIndex(n => n.id === nodeId);
                if (nodeIndex !== -1) {
                    nodes.splice(nodeIndex, 1);
                }
                
                // 从edges数组中删除与该节点相关的所有连线
                edges = edges.filter(edge => edge.source !== nodeId && edge.target !== nodeId);
                
                // 从DOM中删除节点元素
                const nodeElement = document.querySelector(`[data-node-id="${nodeId}"]`);
                if (nodeElement) {
                    nodeElement.remove();
                }
                
                // 如果删除的是当前选中的节点，清空选择
                if (selectedNode && selectedNode.id === nodeId) {
                    selectedNode = null;
                    document.getElementById('properties-content').innerHTML = '<p style="color: #999;">选择一个节点查看属性</p>';
                }
                
                // 更新连线显示
                updateConnections();
            }
        }

        function deleteWorkflowBox(boxId) {
            if (confirm('确定删除此工作流框？')) {
                // 从workflowBoxes数组中删除工作流框
                const boxIndex = workflowBoxes.findIndex(box => box.id === boxId);
                if (boxIndex !== -1) {
                    workflowBoxes.splice(boxIndex, 1);
                }
                
                // 从edges数组中删除与该工作流框相关的所有连线
                edges = edges.filter(edge => edge.source !== boxId && edge.target !== boxId);
                
                // 从DOM中删除工作流框元素
                const boxElement = document.querySelector(`[data-box-id="${boxId}"]`);
                if (boxElement) {
                    boxElement.remove();
                }
                
                // 更新连线显示
                updateConnections();
            }
        }

        function startConnection(e, id, direction) {
            isConnecting = true;
            connectionStart = id;
            connectionStartDirection = direction;
            
            // 创建临时连线
            tempLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            tempLine.setAttribute('stroke', '#667eea');
            tempLine.setAttribute('stroke-width', '2');
            tempLine.setAttribute('fill', 'none');
            tempLine.setAttribute('stroke-dasharray', '5,5');
            svg.appendChild(tempLine);
            
            // 监听鼠标移动更新临时连线
            document.addEventListener('mousemove', updateTempLine);
            // 监听鼠标释放结束连接
            document.addEventListener('mouseup', endConnection);
        }

        function updateTempLine(e) {
            if (!isConnecting) return;
            
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;
            
            // 找到起始点
            let startX, startY;
            const sourceNode = nodes.find(n => n.id === connectionStart);
            const sourceBox = workflowBoxes.find(b => b.id === connectionStart);
            
            if (sourceNode) {
                if (connectionStartDirection === 'right') {
                    startX = sourceNode.x + 180;
                    startY = sourceNode.y + 40;
                } else if (connectionStartDirection === 'left') {
                    startX = sourceNode.x;
                    startY = sourceNode.y + 40;
                } else if (connectionStartDirection === 'top') {
                    startX = sourceNode.x + 90;
                    startY = sourceNode.y;
                } else if (connectionStartDirection === 'bottom') {
                    startX = sourceNode.x + 90;
                    startY = sourceNode.y + 80;
                }
            } else if (sourceBox) {
                startX = sourceBox.x + sourceBox.width / 2;
                startY = sourceBox.y;
            }
            
            // 更新临时连线
            if (tempLine) {
                const d = `M ${startX} ${startY} L ${endX} ${endY}`;
                tempLine.setAttribute('d', d);
            }
        }

        function endConnection(e) {
            if (!isConnecting) return;
            
            // 移除临时连线
            if (tempLine) {
                tempLine.remove();
                tempLine = null;
            }
            
            // 检查是否连接到了目标
            const target = e.target;
            if (target.classList.contains('connection-point')) {
                const targetId = target.dataset.nodeId;
                const targetDirection = target.dataset.direction;
                
                // 确保不是连接到自身
                if (connectionStart !== targetId) {
                    // 检查是否已经存在相同的连线
                    const existingEdge = edges.find(edge => 
                        edge.source === connectionStart && edge.target === targetId
                    );
                    
                    if (!existingEdge) {
                        // 创建新连线
                        const edge = {
                            id: `edge_${Date.now()}`,
                            source: connectionStart,
                            target: targetId
                        };
                        edges.push(edge);
                        updateConnections();
                    }
                }
            } else if (target.classList.contains('workflow-box-connection')) {
                const targetId = target.dataset.boxId;
                
                // 确保不是连接到自身
                if (connectionStart !== targetId) {
                    // 检查是否已经存在相同的连线
                    const existingEdge = edges.find(edge => 
                        edge.source === connectionStart && edge.target === targetId
                    );
                    
                    if (!existingEdge) {
                        // 创建新连线
                        const edge = {
                            id: `edge_${Date.now()}`,
                            source: connectionStart,
                            target: targetId
                        };
                        edges.push(edge);
                        updateConnections();
                    }
                }
            }
            
            // 清理
            isConnecting = false;
            connectionStart = null;
            connectionStartDirection = null;
            document.removeEventListener('mousemove', updateTempLine);
            document.removeEventListener('mouseup', endConnection);
        }

        function updateConnections() {
            svg.innerHTML = '';
            const rect = canvas.getBoundingClientRect();
            
            edges.forEach(edge => {
                let sourceNode = nodes.find(n => n.id === edge.source);
                let targetNode = nodes.find(n => n.id === edge.target);
                let sourceBox = workflowBoxes.find(b => b.id === edge.source);
                let targetBox = workflowBoxes.find(b => b.id === edge.target);
                
                if (!sourceNode && !sourceBox) return;
                if (!targetNode && !targetBox) return;
                
                let startX, startY, endX, endY;
                let d; // 声明路径变量
                
                // 获取连接方向（默认为左右连接）
                const sourceDir = edge.sourceDirection || 'right';
                const targetDir = edge.targetDirection || 'left';
                
                // 计算起点位置（根据源节点类型和方向）
                if (sourceNode) {
                    switch (sourceDir) {
                        case 'top':
                            startX = sourceNode.x + 90;
                            startY = sourceNode.y;
                            break;
                        case 'bottom':
                            startX = sourceNode.x + 90;
                            startY = sourceNode.y + 80;
                            break;
                        case 'left':
                            startX = sourceNode.x;
                            startY = sourceNode.y + 40;
                            break;
                        case 'right':
                        default:
                            startX = sourceNode.x + 180;
                            startY = sourceNode.y + 40;
                            break;
                    }
                } else if (sourceBox) {
                    // 工作流框的连接点
                    switch (sourceDir) {
                        case 'top':
                            startX = sourceBox.x + sourceBox.width / 2;
                            startY = sourceBox.y;
                            break;
                        case 'bottom':
                            startX = sourceBox.x + sourceBox.width / 2;
                            startY = sourceBox.y + sourceBox.height;
                            break;
                        case 'left':
                            startX = sourceBox.x;
                            startY = sourceBox.y + sourceBox.height / 2;
                            break;
                        case 'right':
                        default:
                            startX = sourceBox.x + sourceBox.width;
                            startY = sourceBox.y + sourceBox.height / 2;
                            break;
                    }
                }
                
                // 计算终点位置（根据目标节点类型和方向）
                if (targetNode) {
                    switch (targetDir) {
                        case 'top':
                            endX = targetNode.x + 90;
                            endY = targetNode.y;
                            break;
                        case 'bottom':
                            endX = targetNode.x + 90;
                            endY = targetNode.y + 80;
                            break;
                        case 'left':
                            endX = targetNode.x;
                            endY = targetNode.y + 40;
                            break;
                        case 'right':
                        default:
                            endX = targetNode.x + 180;
                            endY = targetNode.y + 40;
                            break;
                    }
                } else if (targetBox) {
                    // 工作流框的连接点
                    switch (targetDir) {
                        case 'top':
                            endX = targetBox.x + targetBox.width / 2;
                            endY = targetBox.y;
                            break;
                        case 'bottom':
                            endX = targetBox.x + targetBox.width / 2;
                            endY = targetBox.y + targetBox.height;
                            break;
                        case 'left':
                            endX = targetBox.x;
                            endY = targetBox.y + targetBox.height / 2;
                            break;
                        case 'right':
                        default:
                            endX = targetBox.x + targetBox.width;
                            endY = targetBox.y + targetBox.height / 2;
                            break;
                    }
                }
                
                // 为循环节点到工作流框的连线优化路径（类似Coze风格）
                if (sourceNode && sourceNode.type === 'loop' && targetBox && sourceDir === 'bottom' && targetDir === 'top') {
                    // 循环节点底部 -> 工作流框顶部：垂直向下的直线 + 小弧度
                    const midY = (startY + endY) / 2;
                    d = `M ${startX} ${startY} C ${startX} ${midY}, ${endX} ${midY}, ${endX} ${endY}`;
                    
                    // 同时绘制返回的虚线（工作流框底部 -> 循环节点顶部）
                    const returnStartX = targetBox.x + targetBox.width / 2;
                    const returnStartY = targetBox.y + targetBox.height;
                    const returnEndX = sourceNode.x + 90;
                    const returnEndY = sourceNode.y;
                    const returnMidY = (returnStartY + returnEndY) / 2;
                    const returnD = `M ${returnStartX} ${returnStartY} C ${returnStartX + 60} ${returnMidY}, ${returnEndX - 60} ${returnMidY}, ${returnEndX} ${returnEndY}`;
                    
                    const returnPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    returnPath.setAttribute('d', returnD);
                    returnPath.setAttribute('stroke', '#667eea');
                    returnPath.setAttribute('stroke-width', '2');
                    returnPath.setAttribute('fill', 'none');
                    returnPath.setAttribute('marker-end', 'url(#arrowhead)');
                    returnPath.setAttribute('stroke-dasharray', '8,4');
                    svg.appendChild(returnPath);
                } else {
                    // 默认贝塞尔曲线路径
                    if (Math.abs(startY - endY) > 30) {
                        // �垂直到下连接
                        d = `M ${startX} ${startY} C ${startX} ${startY + (endY > startY ? 40 : -40)}, ${endX} ${endY + (endY > startY ? -40 : 40)}, ${endX} ${endY}`;
                    } else {
                        // 水平连接
                        d = `M ${startX} ${startY} C ${startX + 50} ${startY}, ${endX - 50} ${endY}, ${endX} ${endY}`;
                    }
                }
                
                // 创建并添加路径元素
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', d);
                path.setAttribute('stroke', '#667eea');
                path.setAttribute('stroke-width', '2');
                path.setAttribute('fill', 'none');
                path.setAttribute('marker-end', 'url(#arrowhead)');
                
                svg.appendChild(path);
            });
            
            // 添加箭头标记
            if (edges.length > 0 && !document.getElementById('arrowhead')) {
                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
                marker.setAttribute('id', 'arrowhead');
                marker.setAttribute('markerWidth', '10');
                marker.setAttribute('markerHeight', '7');
                marker.setAttribute('refX', '9');
                marker.setAttribute('refY', '3.5');
                marker.setAttribute('orient', 'auto');
                
                const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                polygon.setAttribute('points', '0 0, 10 3.5, 0 7');
                polygon.setAttribute('fill', '#667eea');
                
                marker.appendChild(polygon);
                defs.appendChild(marker);
                svg.insertBefore(defs, svg.firstChild);
            }
        }

        // 点击画布取消选择
        canvas.addEventListener('click', () => {
            document.querySelectorAll('.canvas-node').forEach(n => n.classList.remove('selected'));
            selectedNode = null;
            document.getElementById('properties-content').innerHTML = '<p style="color: #999;">选择一个节点查看属性</p>';
        });

        // 生成XML
        function generateXML() {
            const workflow = {
                id: `wf_${new Date().getTime()}`,
                name: '工作流',
                nodes: nodes,
                edges: edges
            };
            
            const xml = `<?xml version="1.0" encoding="UTF-8"?>
<workflow id="${workflow.id}" name="${workflow.name}">
  <nodes>
${nodes.map(node => `    <node id="${node.id}" type="${node.type}">
      <config>
${Object.entries(node.config).map(([key, value]) => `        <${key}>${typeof value === 'object' ? JSON.stringify(value) : value}</${key}>`).join('\n')}
      </config>
    </node>`).join('\n')}
  </nodes>
  <edges>
${edges.map(edge => `    <edge source="${edge.source}" target="${edge.target}"/>`).join('\n')}
  </edges>
</workflow>`;
            
            // 显示XML
            const aiPromptSection = document.getElementById('ai-prompt-section');
            const aiPromptText = document.getElementById('ai-prompt-text');
            aiPromptText.value = xml;
            aiPromptSection.style.display = 'block';
        }

        // 复制AI提示词
        function copyAIPrompt() {
            const aiPromptText = document.getElementById('ai-prompt-text');
            aiPromptText.select();
            document.execCommand('copy');
            showResult('✅ XML已复制到剪贴板！');
        }

        // 保存工作流
        async function saveWorkflow() {
            if (nodes.length === 0) {
                showResult('请先添加节点', true);
                return;
            }
            
            const workflow = {
                id: `wf_${new Date().getTime()}`,
                name: '工作流',
                nodes: nodes,
                edges: edges,
                workflowBoxes: workflowBoxes
            };
            
            try {
                showResult('保存中...');
                
                const response = await fetch('http://localhost:8001/api/workflow/execute-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workflow: workflow,
                        input_data: {}
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 只显示文本结果
                    const textResult = data.result.output || JSON.stringify(data.result);
                    showResult('✅ 工作流执行成功！\n\n结果：\n' + textResult);
                    
                    // 生成AI分析提示词
                    generateAIPrompt(workflow.id);
                } else {
                    showResult('❌ 工作流执行失败：' + data.error, true);
                }
            } catch (error) {
                showResult('❌ 保存失败: ' + error.message + '\n\n请确保后端服务已启动 (localhost:8001)', true);
            }
        }

        // 清空画布
        function clearCanvas() {
            if (confirm('确定清空画布吗？')) {
                // 清空节点和连线
                nodes = [];
                edges = [];
                workflowBoxes = [];
                selectedNode = null;
                
                // 清空DOM
                canvas.innerHTML = '<svg id="connections"></svg>';
                
                // 重置计数器
                nodeIdCounter = 0;
                boxIdCounter = 0;
                
                // 清空属性面板
                document.getElementById('properties-content').innerHTML = '<p style="color: #999;">选择一个节点查看属性</p>';
                document.getElementById('ai-prompt-section').style.display = 'none';
            }
        }

        // 测试执行工作流
        async function testWorkflow() {
            if (nodes.length === 0) {
                showResult('请先添加节点', true);
                return;
            }
            
            // 生成工作流数据
            const workflowData = {
                nodes: nodes,
                edges: edges,
                workflowBoxes: workflowBoxes
            };
            
            try {
                // 显示加载状态
                const toolbar = document.querySelector('.toolbar');
                const testButton = toolbar.querySelector('button');
                const originalText = testButton.textContent;
                testButton.textContent = '执行中...';
                testButton.disabled = true;
                
                showResult('执行中...');
                
                // 发送执行请求到后端服务（8001端口）
                const response = await fetch('http://localhost:8001/api/workflow/execute-data', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workflow: workflowData,
                        input_data: {
                            list: [1, 2, 3],
                            result: 15
                        }
                    })
                });
                
                const result = await response.json();
                
                // 恢复按钮状态
                testButton.textContent = originalText;
                testButton.disabled = false;
                
                // 显示执行结果
                if (result.success) {
                    // 只显示文本结果
                    const textResult = result.result.output || JSON.stringify(result.result);
                    showResult('✅ 执行成功！\n\n结果：\n' + textResult);
                } else {
                    showResult('❌ 执行失败: ' + result.error, true);
                }
            } catch (error) {
                showResult('❌ 测试执行失败: ' + error.message + '\n\n请确保后端服务已启动 (localhost:8001)', true);
                
                // 恢复按钮状态
                const toolbar = document.querySelector('.toolbar');
                const testButton = toolbar.querySelector('button');
                testButton.textContent = '测试执行';
                testButton.disabled = false;
            }
        }

        // 将需要全局访问的函数暴露到window对象
        window.clearCanvas = clearCanvas;
        window.generateXML = generateXML;
        window.saveWorkflow = saveWorkflow;
        window.testWorkflow = testWorkflow;
        window.copyAIPrompt = copyAIPrompt;
        window.deleteWorkflowBox = deleteWorkflowBox;
        window.refreshSkills = refreshSkills;
        window.deleteNode = deleteNode;
        window.zoomIn = zoomIn;
        window.zoomOut = zoomOut;
        window.resetZoom = resetZoom;
        window.exportWorkflow = exportWorkflow;
        window.importWorkflow = importWorkflow;
        window.toggleResultBox = toggleResultBox;
    });
    </script>
</body>
</html>
