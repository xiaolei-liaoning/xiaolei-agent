    <style>
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-animation {
            animation: fadeIn 0.3s ease-out;
        }
        
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .thinking-panel {
            background: #f8fafc;
            border-left: 3px solid #8b5cf6;
            padding: 10px 14px;
            margin: 10px 0;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
        }
        
        .thinking-panel.multi-agent {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-left-color: #f59e0b;
        }
        
        .thinking-panel.single-agent {
            background: #f8fafc;
            border-left-color: #8b5cf6;
        }
        
        .thinking-title {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: #4f46e5;
            font-weight: 500;
        }
        
        .thinking-title.multi-agent {
            color: #d97706;
        }
        
        .thinking-title.single-agent {
            color: #4f46e5;
        }
        
        .thinking-title:hover {
            color: #4338ca;
        }
        
        .thinking-icon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .thinking-icon.loading {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .thinking-content {
            margin-top: 8px;
            display: none;
        }
        
        .thinking-content.show {
            display: block;
        }
        
        .thinking-step {
            display: flex;
            align-items: flex-start;
            margin-bottom: 6px;
            padding-left: 24px;
            position: relative;
        }
        
        .thinking-step::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #d1d5db;
        }
        
        .thinking-step.completed::before {
            background: #22c55e;
        }
        
        .thinking-step.active::before {
            background: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }
        
        .thinking-step-text {
            color: #4b5563;
            line-height: 1.5;
        }
        
        .thinking-step-text strong {
            color: #1f2937;
        }
        
        .loading-dots span {
            animation: loading 1.4s infinite;
            display: inline-block;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes loading {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .thinking-toggle-arrow {
            transition: transform 0.2s ease;
            margin-left: auto;
        }
        
        .thinking-toggle-arrow.rotated {
            transform: rotate(180deg);
        }
    </style>
</head>

    <script>
        let currentCharacter = 'default';
        let ws;
        let messageCount = 0;
        let responseStartTime = 0;
        let currentThinkingSteps = [];

        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:'
            const wsUrl = `${protocol}//${window.location.host}/api/ws/chat`;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = function() {
                console.log('WebSocket连接已建立');
                updateConnectionStatus(true);
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                const responseTime = Date.now() - responseStartTime;
                document.getElementById('response-time').textContent = `${responseTime}ms`;
                
                if (data.thinking_process) {
                    showThinkingProcess(data.thinking_process);
                }

                showTypingEffect(data.reply, data.message_id);
            };

            ws.onclose = function() {
                console.log('WebSocket连接已关闭');
                updateConnectionStatus(false);
                setTimeout(initWebSocket, 5000);
            };

            ws.onerror = function(error) {
                console.error('WebSocket错误:', error);
                updateConnectionStatus(false);
            };
        }

        function updateConnectionStatus(connected) {
            const statusIndicator = document.getElementById('connection-status');
            const statusText = document.getElementById('status-text');
            
            if (connected) {
                statusIndicator.className = 'inline-block w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse';
                statusText.textContent = '已连接';
            } else {
                statusIndicator.className = 'inline-block w-2 h-2 bg-red-500 rounded-full mr-2';
                statusText.textContent = '未连接';
            }
        }

        function addMessage(role, content, useMarkdown = true, isLiked = false, messageId = null, thinkingProcess = null) {
            if (!content || content.length === 0) {
                content = '(空消息)';
            }
            
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex message-animation ${role === 'user' ? 'justify-end' : ''}`;
            messageDiv.dataset.messageId = messageId;
            
            if (role === 'user') {
                messageDiv.innerHTML = `
                    <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-2xl rounded-tr-none p-4 max-w-[80%] shadow-md relative">
                        <p class="leading-relaxed">${escapeHtml(content)}</p>
                    </div>

        function renderThinkingPanel(thinkingProcess) {
            const thinkingId = 'thinking-' + Date.now();
            let stepsHtml = '';
            let panelClass = 'single-agent';
            let titleIcon = 'fa-brain';
            let titleText = '深度思考';
            
            // 检测是否为多Agent协作模式
            if (thinkingProcess && thinkingProcess.mode === 'multi_agent_collaboration') {
                panelClass = 'multi-agent';
                titleIcon = 'fa-users';
                titleText = '多Agent协作';
                
                // 渲染多Agent协作信息
                const collaborationMode = thinkingProcess.collaboration_mode || 'unknown';
                const agentsUsed = thinkingProcess.agents_used || [];
                const executionPlan = thinkingProcess.execution_plan || [];
                
                // 协作模式中文映射
                const modeNames = {
                    'pipeline': '流水线模式',
                    'master_slave': '主从模式',
                    'review': '评审模式',
                    'auction': '拍卖模式',
                    'hybrid': '混合模式'
                };
                
                stepsHtml = `
                    <div class="mb-3 p-2 bg-amber-50 rounded-lg border border-amber-200">
                        <div class="flex items-center mb-2">
                            <i class="fa fa-sitemap mr-2 text-amber-600"></i>
                            <span class="font-medium text-amber-800">协作模式: ${modeNames[collaborationMode] || collaborationMode}</span>
                        </div>
                        ${agentsUsed.length > 0 ? `
                        <div class="flex flex-wrap gap-2 mb-2">
                            <span class="text-sm text-amber-700">参与Agent:</span>
                            ${agentsUsed.map(agent => `
                                <span class="inline-flex items-center px-2 py-1 bg-amber-100 rounded-full text-xs text-amber-800">
                                    <i class="fa fa-user mr-1"></i>${agent}
                                </span>
                            `).join('')}
                        </div>
                        ` : ''}
                        ${executionPlan.length > 0 ? `
                        <div class="text-sm text-amber-700">
                            <span class="font-medium">执行计划:</span>
                            <ul class="mt-1 space-y-1">
                                ${executionPlan.slice(0, 3).map((step, idx) => `
                                    <li class="flex items-start">
                                        <span class="mr-2 text-amber-500">${idx + 1}.</span>
                                        <span>${typeof step === 'object' ? (step.description || step.action || JSON.stringify(step)) : step}</span>
                                    </li>
                                `).join('')}
                                ${executionPlan.length > 3 ? `<li class="text-amber-500">... 还有 ${executionPlan.length - 3} 个步骤</li>` : ''}
                            </ul>
                        </div>
                        ` : ''}
                    </div>
                `;
            } else if (typeof thinkingProcess === 'string') {
                stepsHtml = `
                    <div class="thinking-step active">
                        <span class="thinking-step-text">${escapeHtml(thinkingProcess)}</span>
                    </div>
                `;
            } else if (Array.isArray(thinkingProcess)) {
                thinkingProcess.forEach((step, index) => {
                    const isActive = index === thinkingProcess.length - 1;
                    const isCompleted = index < thinkingProcess.length - 1;
                    stepsHtml += `
                        <div class="thinking-step ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}">
                            <span class="thinking-step-text">${escapeHtml(typeof step === 'string' ? step : (step.title || step.content || '思考中'))}</span>
                        </div>
                    `;
                });
            } else if (thinkingProcess && thinkingProcess.steps) {
                thinkingProcess.steps.forEach((step, index) => {
                    const isActive = index === thinkingProcess.steps.length - 1;
                    const isCompleted = index < thinkingProcess.steps.length - 1;
                    stepsHtml += `
                        <div class="thinking-step ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}">
                            <span class="thinking-step-text">${escapeHtml(step.title || step.content || '思考中')}</span>
                        </div>
                    `;
                });
            } else if (thinkingProcess && typeof thinkingProcess === 'object') {
                // 其他对象格式
                const keys = Object.keys(thinkingProcess);
                if (keys.length > 0) {
                    stepsHtml = `<div class="thinking-step active"><span class="thinking-step-text">处理中...</span></div>`;
                }
            }
            
            return `
                <div class="thinking-panel ${panelClass}">
                    <div class="thinking-title ${panelClass}" onclick="toggleThinkingContent('${thinkingId}')">
                        <div class="thinking-icon">
                            <i class="fa ${titleIcon}"></i>
                        </div>
                        <span>${titleText}</span>
                        <i class="fa fa-chevron-down thinking-toggle-arrow" id="${thinkingId}-arrow"></i>
                    </div>
                    <div class="thinking-content" id="${thinkingId}">
                        ${stepsHtml}
                    </div>
                </div>
            `;
        }

        function toggleThinkingContent(thinkingId) {
            const content = document.getElementById(thinkingId);

        function showTypingEffect(text, messageId = null) {
            if (!text || text.length === 0) {
                text = '暂无回复';
            }
            
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex message-animation';
            messageDiv.dataset.messageId = messageId;
            
            const typingId = 'typing-' + Date.now();
            
            let thinkingHtml = '';
            // 检查 currentThinkingSteps 是否有内容（兼容数组和对象）
            if (currentThinkingSteps && 
                ((Array.isArray(currentThinkingSteps) && currentThinkingSteps.length > 0) || 
                 (typeof currentThinkingSteps === 'object' && Object.keys(currentThinkingSteps).length > 0))) {
                thinkingHtml = renderThinkingPanel(currentThinkingSteps);
                currentThinkingSteps = [];
            }
            
            messageDiv.innerHTML = `
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full flex items-center justify-center mr-3 flex-shrink-0">
                    <i class="fa fa-robot text-white"></i>
                </div>
                <div class="bg-white rounded-2xl rounded-tl-none p-4 max-w-[80%] shadow-md border border-gray-100 relative">
                    ${thinkingHtml}
                    <div id="${typingId}" class="typing-cursor text-gray-800 leading-relaxed"></div>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            const typingElement = document.getElementById(typingId);
            let index = 0;
            const speed = 20;
            
            function typeWriter() {
                if (index < text.length) {
                    typingElement.textContent += text.charAt(index);
                    index++;
                    setTimeout(typeWriter, speed);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                } else {
                    typingElement.classList.remove('typing-cursor');
                    typingElement.innerHTML = marked.parse(text);
                }
            }
            
            typeWriter();
        }

            currentThinkingSteps = thinkingProcess;
        }

        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            
            if (message) {
                addMessage('user', message, false);
                messageInput.value = '';
                responseStartTime = Date.now();
                
                currentThinkingSteps = [
                    '分析用户问题...',
                    '理解用户意图...',
                    '构建回答...',
                    '优化结果...'
                ];
                
                showLoading();

                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        message: message,
                        user_id: 1,
                        character_id: currentCharacter,
                        execution_mode: document.getElementById('execution-mode').value
                    }));
                } else {
                    const executionMode = document.getElementById('execution-mode').value;
                    const requestBody = {
                        message: message,
                        user_id: 1,
                        character_id: currentCharacter
                    };
                    
                    // 根据选择的执行模式添加相应参数
                    if (executionMode === 'single_agent') {
                        requestBody.force_single_agent = true;
                    } else if (executionMode === 'multi_agent') {
                        requestBody.force_multi_agent = true;
                    } else {
                        requestBody.auto_agent_selection = true;
                    }
                    
                    fetch('/api/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    })
                    .then(response => response.json())
                    .then(data => {
                        hideLoading();
                        if (data.thinking_process) {
                            currentThinkingSteps = data.thinking_process;
                        }
                        if (data.skill === 'multi_agent_v2') {
                            addSystemTip('检测到深度思考任务，已启用多Agent协作系统');
                        }
                        showTypingEffect(data.reply, data.message_id);
                    })
                    .catch(error => {
                        hideLoading();
                        console.error('发送消息失败:', error);
                        addMessage('assistant', '抱歉，发送消息失败，请重试');
                    });
                }
            }
        }

        function exportChat() {
            const chatMessages = document.getElementById('chat-messages');
            const messages = [];
            
            chatMessages.querySelectorAll('.flex').forEach(msg => {
                const text = msg.querySelector('p')?.textContent || msg.querySelector('.prose')?.textContent;

                    messages.push(text);
                }
            });
            
            const blob = new Blob([messages.join('\n\n')], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat-export-${new Date().toISOString().slice(0, 10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function escapeHtml(text) {

        async function loadHistory() {
            const historyList = document.getElementById('history-list');
            if (!historyList) return;
            
            try {
                const searchInput = document.getElementById('history-search-input');
                const timeFilter = document.getElementById('history-time-filter');
                
                const params = new URLSearchParams({
                    group_by_session: 'true',
                    limit: '20',
                    offset: '0'
                });
                
                if (searchInput && searchInput.value.trim()) {
                    params.append('search', searchInput.value.trim());
                }
                
                if (timeFilter && timeFilter.value !== 'all') {
                    const now = new Date();
                    let startDate;
                    
                    switch(timeFilter.value) {
                        case 'today':
                            startDate = now.toISOString().split('T')[0];
                            break;
                        case 'week':
                            startDate = new Date(now - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                            break;
                        case 'month':
                            startDate = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
                            break;
                    }
                    
                    if (startDate) {
                        params.append('start_date', startDate);
                    }
                }
                
                const response = await fetch(`/api/history?${params.toString()}`);
                const data = await response.json();
                const sessions = data.sessions || [];
                
                if (!sessions.length) {
                    historyList.innerHTML = `
                        <div class="text-center text-gray-400 text-sm py-8">
                            <i class="fa fa-inbox text-3xl mb-2"></i>
                            <p>暂无历史记录</p>
                        </div>
                    `;
                    return;
                }
                
                historyList.innerHTML = sessions.map(session => {
                    const messageCount = session.message_count || 0;
                    const lastTime = session.last_message_time ? formatTime(session.last_message_time) : '';
                    const preview = session.preview || '无预览';
                    const characterName = getCharacterName(session.character_id);
                    
                    return `
                        <div class="history-session-item bg-gray-50 hover:bg-blue-50 p-3 rounded-lg cursor-pointer transition-all border border-gray-200 hover:border-blue-300" 
                             onclick="loadSession('${session.session_id}', '${session.character_id}')">
                            <div class="flex justify-between items-start mb-1">
                                <span class="font-medium text-sm text-gray-800">${escapeHtml(characterName)}</span>
                                <span class="text-xs text-gray-500">${lastTime}</span>
                            </div>
                            <p class="text-xs text-gray-600 line-clamp-2 mb-1">${escapeHtml(preview)}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-xs bg-blue-100 text-blue-600 px-2 py-0.5 rounded">${messageCount}条消息</span>
                                <button onclick="event.stopPropagation(); continueSession('${session.character_id}')" 
                                        class="text-xs text-blue-600 hover:text-blue-800">
                                    继续对话 →
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('加载历史记录失败:', error);
                historyList.innerHTML = `
                    <div class="text-center text-red-400 text-sm py-8">
                        <i class="fa fa-exclamation-circle text-2xl mb-2"></i>
                        <p>加载失败</p>
                    </div>
                `;
            }
        }

        async function loadSession(sessionId, characterId) {
            try {
                const response = await fetch(`/api/history/session/${sessionId}`);
                const data = await response.json();
                
                if (!data.messages || data.messages.length === 0) {
                    alert('会话为空或不存在');
                    return;
                }
                
                clearChat();
                
                if (characterId) {
                    switchCharacter(characterId);
                }
                
                const chatMessages = document.getElementById('chat-messages');
                data.messages.forEach(msg => {
                    addMessage(msg.role, msg.content, false);
                });
                
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
            } catch (error) {
                console.error('加载会话失败:', error);
                alert('加载会话失败');
            }
        }

        function continueSession(characterId) {
            switchCharacter(characterId);
            document.getElementById('message-input').focus();
        }

        function switchCharacter(characterId) {
            const charBtn = document.querySelector(`[data-character="${characterId}"]`);
            if (charBtn) {
                charBtn.click();
            }
        }

        function getCharacterName(characterId) {
            const charMap = {
                'default': '小龙虾助手',
                'first_love': '温柔初恋',
                'bestfriend': '知心闺蜜',
                'goddess': '高冷女神',
                'libai': '诗仙李白',
                'john_carmack': '约翰·卡马克',
                'linus_torvalds': 'Linus Torvalds'
            };
            return charMap[characterId] || characterId;
        }

        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 24 * 60 * 60 * 1000 && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            
            if (diff < 48 * 60 * 60 * 1000) {
                return '昨天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            }
            
            return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
        }

            const descriptions = {
                'auto': '🤖 智能选择：系统自动判断任务复杂度并选择最优执行方式',
                'single_agent': '🧠 单Agent模式：使用单个Agent处理所有任务，响应快速',
                'multi_agent': '👥 多Agent协作：多个Agent协作完成复杂任务，深度分析'
            };
            document.getElementById('mode-description').textContent = descriptions[mode] || '';
        }

        let planCounter = 0;
        function addPlan() {
            planCounter++;
            const plansList = document.getElementById('plans-list');
            const planDiv = document.createElement('div');
            planDiv.className = 'flex items-center space-x-2';
            planDiv.innerHTML = `
                <input type="text" placeholder="输入方案 ${planCounter}..." 
                       class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="this.parentElement.remove()" class="p-2 text-red-500 hover:text-red-700 transition">
                    <i class="fa fa-trash"></i>
                </button>
            `;
            plansList.appendChild(planDiv);
        }

        document.getElementById('chat-form').addEventListener('submit', function(e) {
            e.preventDefault();
            sendMessage();
        });

        document.getElementById('message-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            initWebSocket();
            document.querySelector('[data-character="default"]').classList.add('character-selected');
            loadHistory();
        });
    </script>
</body>
</html>
