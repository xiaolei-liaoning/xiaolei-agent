name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install pip
      run: python -m pip install --upgrade pip
    - name: Install pytest
      run: pip install pytest
    - name: Run test
      run: pytest tests/test_tools.py -v
