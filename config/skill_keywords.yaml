# 意图映射表（快速路由）
intent_skill_map:
  math_calculation:
    keywords: ["加", "减", "乘", "除", "等于", "计算", "+", "-", "*", "/", "×", "÷"]
    skill: "calculator"
    min_hits: 1
  greeting:
    keywords: ["你好", "嗨", "hello", "hi", "在吗"]
    skill: "chat"
  weather_query:
    keywords: ["天气", "气温", "温度", "下雨", "下雪", "刮风", "预报", "天气怎么样", "天气如何", "多少度", "几度", "会不会下雨", "热不热", "冷不冷"]
    skill: "weather"
    min_hits: 1
  web_scraping:
    keywords: ["热搜", "热榜", "爬取", "抓取", "微博", "抖音", "知乎", "b站", "github", "热点", "排行榜", "爬虫"]
    skill: "web_scraper"
    min_hits: 1
  system_info:
    keywords: ["系统时间", "内存", "磁盘", "cpu", "进程", "网络", "现在几点", "今天几号"]
    skill: "system_toolbox"
  translation:
    keywords: ["翻译", "translate", "中英互译", "翻译成", "翻一下", "翻译这段"]
    skill: "translator"
    min_hits: 1
  gui_control:
    keywords: ["打开", "点击", "截图", "截屏", "音量", "亮度", "微信", "浏览器", "关闭", "截个图", "截个屏", "飞书", "钉钉", "邮件", "日历"]
    skill: "gui_automation"
    min_hits: 1
  data_analysis:
    keywords: ["数据分析", "分析一下", "分析数据", "统计", "可视化", "图表", "做个分析", "做个图表", "画个图", "柱状图", "饼图", "折线图", "词云"]
    skill: "data_analysis"
    min_hits: 1
  knowledge_search:
    keywords: ["是什么", "如何", "为什么", "了解一下", "概念", "原理", "解释", "定义"]
    skill: "rag_search"
    min_hits: 1
  deep_analysis:
    keywords: ["深度思考", "自主搜索", "最新信息", "分析一下", "研究一下", "最新动态"]
    skill: "deep_thinking"
  multi_step_task:
    keywords: ["先", "然后", "接着", "再", "最后", "下一步", "接下来", "第一步", "第二步"]
    skill: "multi_step"
    min_hits: 2
  text_analysis:
    keywords: ["分析文本", "拆解", "提取概要", "生成标题", "文本分析", "长文本", "主要观点", "段落"]
    skill: "text_analyzer"

